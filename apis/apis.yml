# GitHub OpenAPI 3 spec — official, lives in github/rest-api-description.
#
# Curation strategy: the full spec is ~600 operations. Even narrowing
# to five tag groups (issues, pulls, repos, users, search) leaves ~150
# ops — too much for the chat prompt once typed responses are inlined.
# Instead we pin an explicit operationIds allowlist of the ~15 ops that
# cover ~95% of common chat tasks. Add more here when a need arises.
#
# Auth via GITHUB_PERSONAL_ACCESS_TOKEN env var or credential store.
- url: "https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json"
  name: gh
  type: openapi
  auth: bearer
  token-env: GITHUB_PERSONAL_ACCESS_TOKEN
  operation-ids:
    # Issues
    - issues/list-for-repo
    - issues/get
    - issues/create
    - issues/update
    - issues/list-comments
    - issues/create-comment
    # Pull requests
    - pulls/list
    - pulls/get
    - pulls/create
    - pulls/list-files
    - pulls/list-commits
    - pulls/list-reviews
    - pulls/list-review-comments
    - pulls/merge
    # Repositories
    - repos/get
    - repos/list-for-user
    - repos/list-for-authenticated-user
    - repos/list-commits
    - repos/list-branches
    - repos/list-tags
    - repos/list-contributors
    - repos/list-releases
    - repos/get-latest-release
    - repos/get-readme
    - repos/get-content
    # Gists
    - gists/list-for-user
    # Users
    - users/get-by-username
    - users/get-authenticated
    # Search
    - search/issues-and-pull-requests
    - search/users
    - search/repos
    - search/code
